# ============================================================
#  Water Measuring System — Configuration
# ============================================================

# --- Camera settings ---
cameras:
  top:
    id: 0                   # /dev/video0 or Picamera2 index
    label: "Top Camera"
    resolution: [1920, 1080]
    # crop: [x, y, w, h]   # optional — crop to this rectangle before analysis
    color:                  # per-camera CIELAB overrides (optional)
      lower: [20, 100, 140] # [L_min, a_min, b_min]
      upper: [255, 130, 200] # [L_max, a_max, b_max]
  side:
    id: 1                   # /dev/video1 or Picamera2 index
    label: "Side Camera"
    resolution: [1920, 1080]
    # crop: [200, 100, 800, 600]  # example: crop to 800×600 starting at (200,100)
    color:                  # wider tolerance — less light through side
      lower: [20, 85, 120]
      upper: [255, 145, 220]

# --- Color detection (CIELAB) — global fallback ---
color:
  lower: [20, 100, 140]    # [L_min, a_min, b_min]
  upper: [255, 130, 200]   # [L_max, a_max, b_max]

# --- CLAHE brightness normalisation ---
clahe:
  enabled: true
  clip_limit: 2.0           # contrast limit for adaptive histogram eq.
  grid_size: [8, 8]         # tile grid for local normalisation

# --- Analysis settings ---
analysis:
  use_roi: false
  roi_size: 500             # pixels (square, centered)
  min_contour_area: 500     # minimum pixel area to count as a group
  show_mask: false          # debug: show thresholded mask instead of analysis
  snapshot_interval: 0.1    # seconds between shape snapshots

# --- Solenoid valve (GPIO) ---
solenoid:
  gpio_pin: 17              # BCM pin number
  open_duration: 5.0        # seconds the valve stays open

# --- Schedule (24-hour format) ---
schedule:
  enabled: false
  times:                    # list of times to trigger the solenoid
    - "08:00"
    - "14:00"
    - "20:00"
  recording:                # scheduled recordings
    enabled: false
    camera: "both"           # top, side, or both
    duration: 120            # seconds per recording (null = no limit)
    until: null              # wall-clock stop time, e.g. "14:30" (null = use duration)
    times:                   # when to start a recording
      - "08:00"
      - "14:00"
      - "20:00"

# --- Recording ---
recording:
  save_video: true
  fps: 20
  codec: "mp4v"

# --- Output ---
output:
  base_dir: "results"       # graphs and videos saved here
